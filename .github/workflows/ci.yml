name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        run: dart pub get
      - name: Analyze
        run: dart analyze --fatal-infos
      - name: Run tests
        run: dart test --timeout 60s

  benchmark:
    name: Benchmarks (main)
    runs-on: macos-latest
    needs: test
    # Trend-tracking artifact upload. Only runs on pushes to main — PRs
    # use benchmark-regression-gate below, which actually compares deltas.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        run: dart pub get

      - name: Run benchmark suite
        continue-on-error: true
        run: dart run benchmark/run_all.dart "ci-${{ github.sha }}" --repeat=3 --hardware-summary

      - name: Run head-to-head
        continue-on-error: true
        run: dart run benchmark/head_to_head_worker.dart --out=/tmp/h2h.json --repeat=3

      - name: Print head-to-head results
        continue-on-error: true
        run: |
          python3 -c "
          import json
          with open('/tmp/h2h.json') as f:
              d = json.load(f)['cases']
          metrics = [
              ('repeated_point_query', 'qps', 'Point query'),
              ('large_result_read', 'mean_ms', 'Large read 5k'),
              ('stream_invalidation_latency', 'mean_ms', 'Stream invalidation'),
              ('single_row_crud', 'ops_per_sec', 'Single CRUD'),
              ('batch_write_transaction', 'rows_per_sec', 'Batch write'),
          ]
          for case_id, metric, label in metrics:
              v = d.get(case_id, {}).get(metric)
              if v:
                  if metric in ('qps', 'ops_per_sec', 'rows_per_sec'):
                      print(f'{label}: {int(v):,}')
                  else:
                      print(f'{label}: {v:.3f}ms')
          "

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark/results/*.md
            /tmp/h2h.json
          retention-days: 90

  benchmark-regression-gate:
    name: Benchmark regression gate (PR)
    runs-on: macos-latest
    needs: test
    # Runs the PR's base SHA and the simulated PR merge commit on the SAME
    # runner in the same job, then diffs deltas. Shared-runner noise mostly
    # cancels when both sides are measured on the same VM, kernel, and
    # thermal state — so the comparison is meaningful even though absolute
    # numbers aren't reliable enough for the public dashboard.
    #
    # Baseline = `pull_request.base.sha` (pinned; protects against main
    # advancing mid-run). Candidate = `$GITHUB_SHA`, which on pull_request
    # events is the merge commit (base + PR merged) — that's what will
    # become main if this PR lands, so it's the right thing to gate on.
    #
    # Fails the job only on regressions flagged `stable` by run_all.dart's
    # noise-aware threshold; `moderate`/`noisy` rows are ignored.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Run benchmarks on PR base
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -e
          # Pin the baseline to the exact commit this PR is merging into.
          # Using origin/<base> tip instead would drift if main advances
          # during the run, flagging unrelated commits as regressions.
          git fetch origin "$BASE_REF" --depth=1
          git checkout "$BASE_SHA"
          dart pub get
          dart run benchmark/run_all.dart "ci-baseline" --repeat=3
          BASELINE=$(ls -t benchmark/results/*.md | head -1)
          cp "$BASELINE" /tmp/ci-baseline.md
          echo "Baseline saved from $BASELINE (pinned to $BASE_SHA on $BASE_REF)"

      - name: Run benchmarks on PR merge commit and compare
        run: |
          set -e
          # $GITHUB_SHA on pull_request events is the synthetic merge commit
          # (base + PR merged) — the state main would be in if this lands.
          git checkout "$GITHUB_SHA"
          dart pub get
          dart run benchmark/run_all.dart "ci-pr" --repeat=3 --compare-to=/tmp/ci-baseline.md
          PR_RESULT=$(ls -t benchmark/results/*.md | head -1)
          echo "PR_RESULT=$PR_RESULT" >> "$GITHUB_ENV"

      - name: Check for regressions on stable benchmarks
        run: |
          set -e
          {
            echo "## Benchmark comparison"
            echo ""
            sed -n '/## Comparison vs Previous Run/,/^Comparison threshold uses/p' "$PR_RESULT"
          } >> "$GITHUB_STEP_SUMMARY"

          if grep -qE '\| stable +\| +🔴 Regression' "$PR_RESULT"; then
            {
              echo ""
              echo "### ❌ Stable benchmarks regressed"
              echo ""
              grep -E '\| stable +\| +🔴 Regression' "$PR_RESULT"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::One or more stable-category benchmarks regressed vs main"
            grep -E '\| stable +\| +🔴 Regression' "$PR_RESULT"
            exit 1
          fi

          echo "### ✅ No stable-category regressions" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload comparison artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-pr-comparison
          path: |
            /tmp/ci-baseline.md
            ${{ env.PR_RESULT }}
          retention-days: 30
