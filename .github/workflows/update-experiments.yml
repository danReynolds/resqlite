name: Update Docs Data

on:
  push:
    branches: [main]
    paths:
      - 'experiments/*.md'
      - 'benchmark/results/*.md'
      - 'benchmark/HARDWARE_RESULTS.md'
      - 'benchmark/shared/parse_results.dart'
      - 'benchmark/generate_history.dart'
      - 'benchmark/generate_devices.dart'
      - 'benchmark/generate_blog.dart'
      - 'doc/**/*.md'

jobs:
  regenerate:
    name: Regenerate docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Generate history JSON
        run: dart run benchmark/generate_history.dart

      - name: Generate devices JSON
        run: dart run benchmark/generate_devices.dart

      - name: Generate blog pages
        run: dart run benchmark/generate_blog.dart

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "Auto-update docs (experiments + devices + blog)"
          git push
