name: resqlite
description: >-
  High-performance, reactive SQLite for Dart and Flutter.
  Reads, writes, and reactive re-queries run on persistent worker isolates
  with zero main-isolate jank.
version: 0.1.0
repository: https://github.com/purelydan/resqlite
topics:
  - sqlite
  - database
  - reactive
  - flutter

environment:
  sdk: ^3.10.4

dependencies:
  ffi: ^2.1.4
  hooks: ^1.0.0
  code_assets: ^1.0.0
  native_toolchain_c: ^0.17.5
  path: ^1.9.0

dev_dependencies:
  test: ^1.26.3
  sqlite3: ^3.2.0
  sqlite_async: ^0.14.0-wip.0
  # Drift is benchmarked as a peer (cross-library benchmark comparison).
  # `drift` is the runtime dep; `drift_dev` + `build_runner` regenerate
  # the `*_drift_db.g.dart` codegen files from the `@DriftDatabase`
  # annotations under benchmark/drift/. These are dev-only — users of
  # resqlite don't get them.
  drift: ^2.21.0
  drift_dev: ^2.21.0
  build_runner: ^2.4.0
